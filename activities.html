<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أنشطة حضانة أولادنا | متعة وتعلم</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .filter-btn {
            border: 2px solid var(--purple-main);
            color: var(--purple-main);
            border-radius: 50px;
            padding: 8px 25px;
            margin: 5px;
            font-weight: bold;
            transition: 0.3s;
        }
        .filter-btn.active, .filter-btn:hover {
            background-color: var(--purple-main);
            color: white;
        }
        .gallery-item img {
            border-radius: 20px;
            transition: 0.5s;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .gallery-item:hover img {
            transform: scale(1.05) rotate(2deg);
        }
        .activity-label {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: var(--yellow-bright);
            padding: 5px 15px;
            border-radius: 10px;
            font-weight: bold;
            color: var(--purple-main);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><img src="./assets/logo.png" width="60"></a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link active" href="activities.html">الأنشطة</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="py-5 text-center text-white" style="background: var(--purple-main); clip-path: ellipse(100% 100% at 50% 0%);">
        <div class="container py-5" data-aos="fade-down">
            <h1 class="fw-bold">لحظات لا تُنسى في أولادنا 🎈</h1>
            <p class="lead">شاهد كيف يقضي أطفالنا يومهم بين اللعب والتعلم</p>
        </div>
    </header>

    <section class="py-5">
        <div class="container text-center">
            <div class="mb-5" data-aos="fade-up">
                <button class="filter-btn active">تنمية مهارات</button>
                <button class="filter-btn">منتسوي</button>
                <button class="filter-btn active">Fitness</button>
                <button class="filter-btn">اللغة الفرنسية</button>
                <button class="filter-btn active">اللغة الانجليزية</button>
                <button class="filter-btn">حديث وعقيدة</button>
                <button class="filter-btn active">قران</button>

                
            </div>

            <div class="row g-4 gallery-container">
                <div class="col-md-4 gallery-item" data-aos="zoom-in">
                    <div class="position-relative">
                        <img src="./assets/image.png" class="img-fluid" alt="شوي بطاطا">
                        <span class="activity-label">Crazy Fashion🤡</span>
                    </div>
                </div>
                <div class="col-md-4 gallery-item" data-aos="zoom-in" data-aos-delay="100">
                    <div class="position-relative">
                        <img src="./assets/Screenshot 2026-04-01 215416.png" class="img-fluid" alt="بسين">
                        <span class="activity-label">يوم البسين 🌊</span>
                    </div>
                </div>
                <div class="col-md-4 gallery-item" data-aos="zoom-in" data-aos-delay="200">
                    <div class="position-relative">
                        <img src="./assets/image1.png" class="img-fluid" alt="أراجوز">
                        <span class="activity-label">عرض الانتخابات🫡</span>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <div class="text-center mt-4">
    <div class="alert alert-info fw-bold">
        ⏰ تنويه: التواصل على الأرقام المتاحة خلال ساعات العمل فقط من 8 صباحاً إلى 5 مساءً
    </div>
</div>
    <footer class="text-center py-3 mt-5" style="background-color:#111; color:#fff;">
    <p class="mb-0">
        © 2026 جميع الحقوق محفوظة  
        <br>
        تم إنشاء الموقع بواسطة <span style="color:#0d6efd; font-weight:bold;">BMC TEAM</span> من <span style="color:#0d6efd; font-weight:bold;">Ziad Ik</span>
    </p>
</footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init();</script>
</body>
</html>
